version: '3.8'

services:
  codex-register:
    build: .
    container_name: codex-register
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # 如果需要代理，取消下面注释并修改地址
    # environment:
    #   - HTTP_PROXY=http://your-proxy:port
    #   - HTTPS_PROXY=http://your-proxy:port
